# Replace yoursaas.com with your actual domain before deploying.
- op: replace
  path: /metadata/annotations/cert-manager.io~1cluster-issuer
  value: letsencrypt
- op: replace
  path: /spec/tls/0/hosts/0
  value: "portal.yoursaas.com"
- op: replace
  path: /spec/rules/0/host
  value: "portal.yoursaas.com"
