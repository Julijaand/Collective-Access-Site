apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Nebius cloud: letsencrypt, network-ssd storage, Nebius LB nip.io domain.
#
# Usage:
#   ./deploy-secrets.sh                   # create K8s secrets (run once)
#   kubectl apply -k k8s/overlays/nebius/ # deploy or re-deploy

resources:
  - ../../base

patches:
  # ── saas-backend Deployment: BASE_DOMAIN + CA_CERT_ISSUER env vars ─────────
  - path: patch-backend-env.yaml

  # ── saas-backend Ingress: host, TLS, CORS origin, cert issuer ─────────────
  - path: patch-backend-ingress.yaml
    target:
      kind: Ingress
      name: saas-backend-ingress

  # ── Customer portal Ingress: host, TLS, cert issuer ───────────────────────
  - path: patch-portal-ingress.yaml
    target:
      kind: Ingress
      name: customer-portal-ingress

  # ── Customer portal ConfigMap: API + app URLs ─────────────────────────────
  - path: patch-portal-configmap.yaml

  # ── PVCs: storageClassName: network-ssd (required on Nebius) ──────────────
  - path: patch-pvcs.yaml
    target:
      kind: PersistentVolumeClaim
      name: ai-vector-db-pvc
  - path: patch-pvcs.yaml
    target:
      kind: PersistentVolumeClaim
      name: postgres-data-pvc
  - path: patch-pvcs.yaml
    target:
      kind: PersistentVolumeClaim
      name: ollama-models-pvc
  - path: patch-pvcs.yaml
    target:
      kind: PersistentVolumeClaim
      name: mysql-pvc
