# Strategic merge patch — overrides only the URL keys; APP_NAME is inherited from base.
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-portal-config
  namespace: ca-system
data:
  NEXT_PUBLIC_API_URL: "https://api.collective-museum.com"
  NEXT_PUBLIC_WS_URL: "wss://api.collective-museum.com"
  NEXT_PUBLIC_APP_URL: "https://collective-museum.com"
