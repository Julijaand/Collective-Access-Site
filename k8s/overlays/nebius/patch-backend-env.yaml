# Strategic merge patch — merges env[] by name, so only these two keys are overridden.
# The rest of the container spec (secrets, image, probes) is inherited from base unchanged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-backend
  namespace: ca-system
spec:
  template:
    spec:
      containers:
      - name: backend
        env:
        - name: BASE_DOMAIN
          value: "collective-museum.com"
        - name: CA_CERT_ISSUER
          value: "letsencrypt"
        - name: APP_URL
          value: "https://collective-museum.com"
