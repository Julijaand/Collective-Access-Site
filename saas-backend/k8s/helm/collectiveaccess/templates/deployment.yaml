apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: ca
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: 80

          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-db

          env:
            - name: CA_TIMEZONE
              value: {{ .Values.app.timezone | quote }}

            - name: CA_ADMIN_EMAIL
              value: {{ .Values.app.adminEmail | quote }}

            - name: CA_INSTANCE_ID
              value: {{ .Release.Name | quote }}

            - name: CA_TENANT_NAME
              value: {{ .Values.app.tenantDisplayName | quote }}

            - name: CA_APP_NAME
              value: {{ .Values.app.caAppName | quote }}  

          volumeMounts:
            - name: media
              mountPath: /var/www/html/ca/media

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 300  # CA first-boot takes 10-20 min
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 180  # wait 3 min before first check
            periodSeconds: 15
            failureThreshold: 60  # allow 60x15s = 15 more min of retries

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-media
