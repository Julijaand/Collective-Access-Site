apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.certIssuer | quote }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.domain | quote }}
      secretName: {{ .Release.Name }}-tls
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 80
