apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-backend-ingress
  namespace: ca-system
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # CORS - allow customer portal origin
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://DOMAIN_PLACEHOLDER"  # overridden by kustomize overlay
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PATCH, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.DOMAIN_PLACEHOLDER  # overridden by kustomize overlay
      secretName: saas-backend-tls
  rules:
    - host: api.DOMAIN_PLACEHOLDER  # overridden by kustomize overlay
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saas-backend
                port:
                  number: 8000
